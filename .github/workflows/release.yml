name: Release OrderVPN Web

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 3.12.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine and validate version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          # Strip optional leading 'v'
          VERSION="${VERSION#v}"

          # Basic semver-like validation
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must be in semver format (e.g. 3.12.0). Got: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build tarball and update SHA256
        run: |
          bash build.sh "${{ steps.version.outputs.version }}"

      - name: Verify tarball exists
        run: |
          if [[ ! -s "ordervpn-src.tar.gz" ]]; then
            echo "ERROR: ordervpn-src.tar.gz was not built or is empty." >&2
            exit 1
          fi
          ls -lh ordervpn-src.tar.gz
          sha256sum ordervpn-src.tar.gz

      - name: Commit SHA256 update to main
        id: commit
        run: |
          if git diff --quiet -- vpn.sh; then
            echo "No SHA256 changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add vpn.sh
            git commit -m "chore: update SHA256 for v${{ steps.version.outputs.version }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push updated main branch
        if: steps.commit.outputs.changed == 'true'
        run: |
          git pull --rebase origin main
          git push origin main

      - name: Move release tag to updated commit
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ steps.version.outputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          git tag -f "$TAG"
          git push --force origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: OrderVPN Web ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: ordervpn-src.tar.gz
